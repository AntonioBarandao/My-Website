<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <title>JavaScript Problem-Solving Lab</title>
<body>

<h1>JavaScript Problem-Solving Lab</h1>

<!-- Palindrome Checker -->
<section>
    <h2>Palindrome Checker</h2>
    <input type="text" id="palindromeInput" placeholder="Enter a string or number">
    <button onclick="checkPalindrome()">Check Palindrome</button>
    <div id="palindromeResult" class="result"></div>
</section>

<!-- Prime Number Checker -->
<section>
    <h2>Prime Number Checker</h2>
    <input type="number" id="primeInput" placeholder="Enter a number">
    <button onclick="checkPrime()">Check Prime</button>
    <div id="primeResult" class="result"></div>
</section>
<script src="Index.js"></script>
</body>
</html>
